<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>AssistLiving — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pri:#1A7A6D;--pri-dark:#145F55;--pri-light:#E6F4F1;
  --accent:#E07A52;--bg:#F7F4EF;--card:#FFFFFF;
  --text:#2D3436;--muted:#7A8B8D;--border:#E2DFD8;
  --success:#27AE60;--warning:#F39C12;--danger:#E74C3C;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.06);
}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}

#loading{position:fixed;inset:0;background:rgba(247,244,239,0.85);display:flex;align-items:center;justify-content:center;z-index:9999}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;color:#fff;font-weight:500;z-index:10000;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}#toast.success{background:var(--success)}#toast.error{background:var(--danger)}#toast.info{background:var(--pri)}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--card);border-radius:var(--radius);padding:28px;width:100%;max-width:380px;box-shadow:var(--shadow)}
.auth-card h2{font-family:'DM Serif Display',serif;text-align:center;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-weight:500;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--pri)}
.form-group textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border-radius:8px;font-weight:600;width:100%;transition:all .2s}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri-dark)}
.btn-sm{padding:6px 14px;font-size:13px;width:auto}
.btn-outline{border:1.5px solid var(--border);color:var(--text);background:var(--card)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}

/* App */
#admin-app{display:none}
.top-bar{background:var(--pri);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar h1{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400}

/* Tabs */
.admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:var(--card);position:sticky;top:52px;z-index:99;overflow-x:auto}
.admin-tab-btn{padding:12px 20px;font-weight:600;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
.admin-tab-btn.active{color:var(--pri);border-bottom-color:var(--pri)}
.admin-panel{display:none;padding:16px;max-width:800px;margin:0 auto}
.admin-panel.active{display:block}

.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.card h3{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:12px}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;background:var(--pri-light);color:var(--pri);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:var(--bg)}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:#FEF3E2;color:#E67E22}
.badge-confirmed{background:#E8F8EF;color:#27AE60}
.badge-cancelled{background:#FDEDEC;color:#E74C3C}
.badge-completed{background:var(--pri-light);color:var(--pri)}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center}
.stat-card .stat-val{font-size:28px;font-weight:700;color:var(--pri);font-family:'DM Serif Display',serif}
.stat-card .stat-label{font-size:12px;color:var(--muted);margin-top:2px}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="loading" class="hidden"><div class="spinner"></div></div>
<div id="toast"></div>

<!-- Auth -->
<div id="auth" class="auth-wrap">
  <div style="text-align:center;margin-bottom:24px">
    <div style="width:56px;height:56px;background:var(--pri);color:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px">⚙️</div>
    <h1 style="font-family:'DM Serif Display',serif;font-size:24px;color:var(--pri)">Admin Panel</h1>
  </div>
  <div class="auth-card">
    <h2>Staff Login</h2>
    <div class="form-group"><label>Phone</label><input type="tel" id="login-phone" placeholder="91234567"></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pw"></div>
    <button class="btn btn-pri" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- Admin App -->
<div id="admin-app">
  <div class="top-bar">
    <h1>🏠 AssistLiving Admin</h1>
    <button class="btn btn-sm" style="color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="doLogout()">Logout</button>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab-btn active" onclick="showPanel('dashboard')">Dashboard</button>
    <button class="admin-tab-btn" onclick="showPanel('members')">Members</button>
    <button class="admin-tab-btn" onclick="showPanel('appointments')">Appointments</button>
    <button class="admin-tab-btn" onclick="showPanel('orders')">Orders</button>
    <button class="admin-tab-btn" onclick="showPanel('updates')">Updates</button>
  </div>

  <!-- Dashboard -->
  <div id="panel-dashboard" class="admin-panel active">
    <h2 style="font-family:'DM Serif Display',serif;margin:8px 0 16px">Dashboard</h2>
    <div class="stat-grid" id="stats"></div>
    <div class="card">
      <h3>Recent Appointments</h3>
      <div class="tbl-wrap" id="dash-appts"></div>
    </div>
    <div class="card">
      <h3>Recent Orders</h3>
      <div class="tbl-wrap" id="dash-orders"></div>
    </div>
  </div>

  <!-- Members -->
  <div id="panel-members" class="admin-panel">
    <h2 style="font-family:'DM Serif Display',serif;margin:8px 0 16px">Members</h2>
    <div class="card"><div class="tbl-wrap" id="members-table"></div></div>
  </div>

  <!-- Appointments -->
  <div id="panel-appointments" class="admin-panel">
    <h2 style="font-family:'DM Serif Display',serif;margin:8px 0 16px">All Appointments</h2>
    <div class="card"><div class="tbl-wrap" id="appts-table"></div></div>
  </div>

  <!-- Orders -->
  <div id="panel-orders" class="admin-panel">
    <h2 style="font-family:'DM Serif Display',serif;margin:8px 0 16px">All Orders</h2>
    <div class="card"><div class="tbl-wrap" id="orders-table"></div></div>
  </div>

  <!-- Updates -->
  <div id="panel-updates" class="admin-panel">
    <h2 style="font-family:'DM Serif Display',serif;margin:8px 0 16px">Post Update</h2>
    <div class="card">
      <h3>New Announcement</h3>
      <div class="form-group"><label>Title</label><input type="text" id="upd-title"></div>
      <div class="form-group"><label>Content</label><textarea id="upd-content" rows="4"></textarea></div>
      <button class="btn btn-pri" onclick="postUpdate()">Publish Update</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxolRxdDO0-xGs6Z6LdSGr4cSJAQsZOZtNb0lTro-fYr235LeVAFRTymg-QAkk0nQaCvg/exec';
let ME = null;

function $(id){return document.getElementById(id)}
function show(id){$(id).classList.remove('hidden')}
function hide(id){$(id).classList.add('hidden')}
function toast(msg,type='info'){const t=$('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',3000)}
function loading(on){if(on)show('loading');else hide('loading')}

async function api(body){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body),redirect:'follow'});
  return r.json();
}

function formatDate(d){if(!d)return'-';return new Date(d).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'})}
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function badgeClass(s){return s==='confirmed'?'badge-confirmed':s==='cancelled'?'badge-cancelled':s==='completed'?'badge-completed':'badge-pending'}

async function doLogin(){
  const phone=$('login-phone').value.trim(),pw=$('login-pw').value;
  if(!phone||!pw)return toast('Enter credentials','error');
  loading(true);
  try{
    const r=await api({action:'login',phone,password:pw});
    if(!r.ok)return toast(r.error,'error');
    if(r.member.role!=='admin')return toast('Admin access only','error');
    ME=r.member;
    localStorage.setItem('al_admin',JSON.stringify(ME));
    enterAdmin();
  }catch(e){toast('Connection error','error')}
  finally{loading(false)}
}

function doLogout(){ME=null;localStorage.removeItem('al_admin');hide('admin-app');show('auth')}

function enterAdmin(){
  hide('auth');show('admin-app');
  loadAll();
}

let allMembers=[],allAppts=[],allOrders=[];

async function loadAll(){
  loading(true);
  try{
    const[mr,ar,or]=await Promise.all([
      api({action:'adminGetMembers',adminId:ME.id}),
      api({action:'adminGetAllAppointments',adminId:ME.id}),
      api({action:'adminGetAllOrders',adminId:ME.id})
    ]);
    if(mr.ok)allMembers=mr.members;
    if(ar.ok)allAppts=ar.appointments;
    if(or.ok)allOrders=or.orders;
    renderAll();
  }catch(e){toast('Error loading data','error')}
  finally{loading(false)}
}

function renderAll(){
  // Stats
  const pending=allAppts.filter(a=>a.status==='pending').length;
  const pendingOrd=allOrders.filter(o=>o.status==='pending').length;
  $('stats').innerHTML=`
    <div class="stat-card"><div class="stat-val">${allMembers.length}</div><div class="stat-label">Members</div></div>
    <div class="stat-card"><div class="stat-val">${allAppts.length}</div><div class="stat-label">Appointments</div></div>
    <div class="stat-card"><div class="stat-val">${pending}</div><div class="stat-label">Pending Appts</div></div>
    <div class="stat-card"><div class="stat-val">${allOrders.length}</div><div class="stat-label">Orders</div></div>
    <div class="stat-card"><div class="stat-val">${pendingOrd}</div><div class="stat-label">Pending Orders</div></div>
  `;

  // Dashboard recent
  $('dash-appts').innerHTML=renderApptTable(allAppts.slice(0,5),true);
  $('dash-orders').innerHTML=renderOrderTable(allOrders.slice(0,5),true);

  // Full tables
  $('members-table').innerHTML=renderMemberTable();
  $('appts-table').innerHTML=renderApptTable(allAppts,false);
  $('orders-table').innerHTML=renderOrderTable(allOrders,false);
}

function renderMemberTable(){
  if(!allMembers.length)return'<p style="color:var(--muted)">No members</p>';
  return`<table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead><tbody>${
    allMembers.map(m=>`<tr><td>${esc(m.name)}</td><td>${m.phone}</td><td>${m.email||'-'}</td><td>${m.role}</td><td>${formatDate(m.createdAt)}</td></tr>`).join('')
  }</tbody></table>`;
}

function renderApptTable(list,compact){
  if(!list.length)return'<p style="color:var(--muted)">No appointments</p>';
  return`<table><thead><tr><th>Member</th><th>Type</th><th>Date</th><th>Time</th><th>Status</th>${compact?'':'<th>Actions</th>'}</tr></thead><tbody>${
    list.map(a=>{
      const actions=compact?'':`<td>
        <select onchange="updateApptStatus('${a.id}',this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:12px">
          <option value="pending" ${a.status==='pending'?'selected':''}>Pending</option>
          <option value="confirmed" ${a.status==='confirmed'?'selected':''}>Confirmed</option>
          <option value="completed" ${a.status==='completed'?'selected':''}>Completed</option>
          <option value="cancelled" ${a.status==='cancelled'?'selected':''}>Cancelled</option>
        </select></td>`;
      return`<tr><td>${esc(a.memberName)}</td><td>${esc(a.type)}</td><td>${formatDate(a.date)}</td><td>${a.time}</td><td><span class="badge ${badgeClass(a.status)}">${a.status}</span></td>${actions}</tr>`;
    }).join('')
  }</tbody></table>`;
}

function renderOrderTable(list,compact){
  if(!list.length)return'<p style="color:var(--muted)">No orders</p>';
  return`<table><thead><tr><th>Member</th><th>Product</th><th>Type</th><th>Total</th><th>Status</th>${compact?'':'<th>Actions</th>'}</tr></thead><tbody>${
    list.map(o=>{
      const actions=compact?'':`<td>
        <select onchange="updateOrderStatus('${o.id}',this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:12px">
          <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
          <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
          <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
          <option value="returned" ${o.status==='returned'?'selected':''}>Returned</option>
          <option value="completed" ${o.status==='completed'?'selected':''}>Completed</option>
          <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
        </select></td>`;
      return`<tr><td>${esc(o.memberName)}</td><td>${esc(o.productName)}</td><td>${o.type}</td><td>$${Number(o.totalPrice).toFixed(2)}</td><td><span class="badge ${badgeClass(o.status)}">${o.status}</span></td>${actions}</tr>`;
    }).join('')
  }</tbody></table>`;
}

async function updateApptStatus(id,status){
  loading(true);
  try{
    await api({action:'adminUpdateAppointment',adminId:ME.id,id,status});
    toast('Updated','success');
    await loadAll();
  }catch(e){toast('Error','error')}
  finally{loading(false)}
}

async function updateOrderStatus(id,status){
  loading(true);
  try{
    await api({action:'adminUpdateOrder',adminId:ME.id,id,status});
    toast('Updated','success');
    await loadAll();
  }catch(e){toast('Error','error')}
  finally{loading(false)}
}

async function postUpdate(){
  const title=$('upd-title').value.trim(),content=$('upd-content').value.trim();
  if(!title||!content)return toast('Fill title and content','error');
  loading(true);
  try{
    await api({action:'adminAddUpdate',adminId:ME.id,title,content,author:ME.name});
    toast('Published!','success');
    $('upd-title').value='';$('upd-content').value='';
  }catch(e){toast('Error','error')}
  finally{loading(false)}
}

function showPanel(name){
  document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.admin-tab-btn').forEach(b=>b.classList.remove('active'));
  $('panel-'+name).classList.add('active');
  event.target.classList.add('active');
}

window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('al_admin');
  if(saved){try{ME=JSON.parse(saved);enterAdmin()}catch(e){}}
});
</script>
</body>
</html>
